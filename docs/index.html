<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>U.S. Drug Seizure Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
      :root {
        --ink: #17202c;
        --muted: #52637a;
        --paper: #f8f6f2;
        --card: #ffffff;
        --line: #dde5ef;
        --accent: #cf5d17;
        --shadow: 0 8px 28px rgba(19, 33, 53, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, #fff5df 0%, rgba(255, 245, 223, 0) 45%),
          radial-gradient(circle at 90% 0%, #dceeff 0%, rgba(220, 238, 255, 0) 35%),
          linear-gradient(170deg, #f7fafc 0%, #f5f2ee 100%);
        min-height: 100vh;
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px 18px 28px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.3vw, 2.2rem);
      }

      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .grid {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .controls {
        padding: 16px;
      }

      .section {
        margin-bottom: 14px;
      }

      .section:last-child {
        margin-bottom: 0;
      }

      .label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 700;
        color: #243247;
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.8rem;
      }

      select {
        width: 100%;
        padding: 8px;
        border-radius: 10px;
        border: 1px solid #cbd9e8;
        background: #fbfdff;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.84rem;
      }

      select[multiple] {
        min-height: 132px;
      }

      .btn-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid #b9c7d7;
        border-radius: 10px;
        padding: 6px 10px;
        cursor: pointer;
        background: #fff;
        font-family: "Space Grotesk", sans-serif;
      }

      button.primary {
        border-color: #ce611f;
        background: var(--accent);
        color: #fff;
      }

      .toggle-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .hidden {
        display: none;
      }

      .panel {
        padding: 16px;
      }

      .kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .kpi {
        background: linear-gradient(140deg, #f9fcff 0%, #eff5fb 100%);
        border: 1px solid #dce7f4;
        border-radius: 12px;
        padding: 10px;
      }

      .kpi .name {
        color: #5a6b84;
        font-size: 0.79rem;
      }

      .kpi .value {
        margin-top: 4px;
        font-size: 1.1rem;
        font-weight: 700;
      }

      #map {
        width: 100%;
        height: 560px;
      }

      #trendWrap {
        margin-top: 12px;
      }

      #trend {
        width: 100%;
        height: 260px;
      }

      .table-wrap {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: auto;
        max-height: 340px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px solid #e8eef5;
        padding: 8px 10px;
      }

      th {
        position: sticky;
        top: 0;
        background: #f8fbff;
      }

      .footer {
        margin-top: 10px;
        color: var(--muted);
        font-size: 0.81rem;
      }

      .status {
        margin-top: 10px;
        color: #a03407;
        font-size: 0.9rem;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        #map {
          height: 420px;
        }

        .kpis {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>U.S. Drug Seizure Dashboard</h1>
      <div class="subtitle">
        Combined dashboard with NFLIS state reports and CBP fentanyl seizures at Field Office/Sector level.
      </div>

      <div class="grid">
        <aside class="card controls">
          <div class="section">
            <label class="label" for="sourceSelect">Data Source</label>
            <select id="sourceSelect">
              <option value="nflis">NFLIS state reports (all drugs)</option>
              <option value="cbp">CBP fentanyl seizures (Field Office/Sector)</option>
            </select>
          </div>

          <div id="nflisControls">
            <div class="section">
              <label class="label" for="nflisYearSelect">Years</label>
              <select id="nflisYearSelect" multiple></select>
              <div class="btn-row">
                <button type="button" id="nflisYearAll">All Years</button>
                <button type="button" id="nflisYearNone">Clear Years</button>
              </div>
            </div>

            <div class="section">
              <label class="label" for="nflisDrugSelect">Drugs</label>
              <select id="nflisDrugSelect" multiple></select>
              <div class="btn-row">
                <button type="button" id="nflisDrugAll">All Drugs</button>
                <button type="button" id="nflisDrugNone">Clear Drugs</button>
                <button type="button" id="nflisDrugFentanyl">Fentanyl Only</button>
              </div>
            </div>

            <div class="section">
              <span class="label">Metric</span>
              <div class="toggle-row">
                <label>
                  <input type="radio" name="nflisMetricMode" value="sum" checked />
                  Total reports
                </label>
                <label>
                  <input type="radio" name="nflisMetricMode" value="avg" />
                  Average annual reports
                </label>
              </div>
            </div>

            <div class="section">
              <label>
                <input type="checkbox" id="nflisHideZero" />
                Hide states with zero values
              </label>
            </div>
          </div>

          <div id="cbpControls" class="hidden">
            <div class="section">
              <label>
                <input type="checkbox" id="cbpIncludeFytd" />
                Include FYTD (partial fiscal year)
              </label>
              <div class="hint">
                U.S. fiscal year months are converted to actual calendar month-year (Oct-Dec map to prior year).
              </div>
            </div>

            <div class="section">
              <label class="label" for="cbpFySelect">Fiscal Years</label>
              <select id="cbpFySelect" multiple></select>
              <div class="btn-row">
                <button type="button" id="cbpFyAll">All FY</button>
                <button type="button" id="cbpFyNone">Clear FY</button>
              </div>
            </div>

            <div class="section">
              <label class="label" for="cbpMonthSelect">Month</label>
              <select id="cbpMonthSelect" multiple></select>
            </div>

            <div class="section">
              <label class="label" for="cbpComponentSelect">Component</label>
              <select id="cbpComponentSelect" multiple></select>
            </div>

            <div class="section">
              <label class="label" for="cbpRegionSelect">Region</label>
              <select id="cbpRegionSelect" multiple></select>
            </div>

            <div class="section">
              <label class="label" for="cbpLandSelect">Land Filter</label>
              <select id="cbpLandSelect" multiple></select>
            </div>

            <div class="section">
              <label class="label" for="cbpAorSelect">Field Office / Sector</label>
              <select id="cbpAorSelect" multiple></select>
              <div class="btn-row">
                <button type="button" id="cbpAorAll">All AOR</button>
                <button type="button" id="cbpAorNone">Clear AOR</button>
              </div>
            </div>

            <div class="section">
              <span class="label">Metric</span>
              <div class="toggle-row">
                <label>
                  <input type="radio" name="cbpMetricMode" value="events" checked />
                  Seizure events
                </label>
                <label>
                  <input type="radio" name="cbpMetricMode" value="lbs" />
                  Seized quantity (lbs)
                </label>
              </div>
            </div>
          </div>

          <div class="section">
            <button type="button" class="primary" id="downloadCsv">Download filtered table</button>
          </div>

          <div id="status" class="status"></div>
        </aside>

        <main class="card panel">
          <div class="kpis">
            <div class="kpi">
              <div class="name" id="kpi1Name">Selection 1</div>
              <div class="value" id="kpi1Value">0</div>
            </div>
            <div class="kpi">
              <div class="name" id="kpi2Name">Selection 2</div>
              <div class="value" id="kpi2Value">0</div>
            </div>
            <div class="kpi">
              <div class="name" id="kpi3Name">Metric</div>
              <div class="value" id="kpi3Value">0</div>
            </div>
          </div>

          <div id="map"></div>

          <div id="trendWrap" class="hidden">
            <div id="trend"></div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr id="tableHeaderRow"></tr>
              </thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <div class="footer" id="footerNote"></div>
        </main>
      </div>
    </div>

    <script>
      const NFLIS_DATA_FILE = "./nflis_state_year_drug_counts_2017_2022.csv";
      const CBP_DATA_FILE = "./cbp_fentanyl_aor_monthly_2019_2026_dec.csv";

      ];

      const AOR_COORDS = {

        "EL CENTRO SECTOR": [32.7920, -115.5631],

        "GRAND FORKS SECTOR": [47.9253, -97.0329],

        "HOULTON SECTOR": [46.1262, -67.8398],

        "SAN FRANCISCO FIELD OFFICE": [37.7749, -122.4194],
        "SAN JUAN FIELD OFFICE": [18.4655, -66.1057],
        "SEATTLE FIELD OFFICE": [47.6062, -122.3321],
        "SPOKANE SECTOR": [47.6588, -117.4260],
        "SWANTON SECTOR": [44.9184, -73.1218],
        "TAMPA FIELD OFFICE": [27.9506, -82.4572],
        "TUCSON FIELD OFFICE": [32.2226, -110.9747],
        "TUCSON SECTOR": [32.2226, -110.9747],
        "YUMA SECTOR": [32.6927, -114.6277],
      };

      const store = {
        nflisRows: [],
        cbpRows: [],
        nflisMeta: { years: [], drugs: [], states: [] },
        cbpMeta: { fyLabels: [], months: [], components: [], regions: [], landFilters: [], aors: [] },
      };

      let currentDownloadRows = [];
      let currentDownloadFilename = "filtered_dashboard_rows.csv";

      const sourceSelect = document.getElementById("sourceSelect");
      const nflisControls = document.getElementById("nflisControls");
      const cbpControls = document.getElementById("cbpControls");
      const statusEl = document.getElementById("status");
      const footerNote = document.getElementById("footerNote");
      const trendWrap = document.getElementById("trendWrap");

      const kpi1Name = document.getElementById("kpi1Name");
      const kpi1Value = document.getElementById("kpi1Value");
      const kpi2Name = document.getElementById("kpi2Name");
      const kpi2Value = document.getElementById("kpi2Value");
      const kpi3Name = document.getElementById("kpi3Name");
      const kpi3Value = document.getElementById("kpi3Value");
      const tableHeaderRow = document.getElementById("tableHeaderRow");
      const tableBody = document.getElementById("tableBody");

      const nflisYearSelect = document.getElementById("nflisYearSelect");
      const nflisDrugSelect = document.getElementById("nflisDrugSelect");
      const nflisHideZero = document.getElementById("nflisHideZero");

      const cbpIncludeFytd = document.getElementById("cbpIncludeFytd");
      const cbpFySelect = document.getElementById("cbpFySelect");
      const cbpMonthSelect = document.getElementById("cbpMonthSelect");
      const cbpComponentSelect = document.getElementById("cbpComponentSelect");
      const cbpRegionSelect = document.getElementById("cbpRegionSelect");
      const cbpLandSelect = document.getElementById("cbpLandSelect");
      const cbpAorSelect = document.getElementById("cbpAorSelect");

      function setStatus(text) {
        statusEl.textContent = text || "";
      }

      function toNumber(value) {
        const n = Number(String(value || "").replace(/,/g, ""));
        return Number.isFinite(n) ? n : 0;
      }

      function formatNum(value, digits = 0) {
        return Number(value || 0).toLocaleString(undefined, { maximumFractionDigits: digits });
      }

      function parseCsv(url) {
        return new Promise((resolve, reject) => {
          Papa.parse(url, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: (results) => resolve(results.data || []),
            error: (error) => reject(error),
          });
        });
      }

      function selectedValues(selectEl) {
        return [...selectEl.options].filter((o) => o.selected).map((o) => o.value);
      }

      function setMultiOptions(selectEl, options, selected = []) {
        const selectedSet = new Set(selected);
        selectEl.innerHTML = "";
        for (const option of options) {
          const opt = document.createElement("option");
          opt.value = String(option);
          opt.textContent = String(option);
          opt.selected = selectedSet.has(String(option));
          selectEl.appendChild(opt);
        }
      }

      function selectAll(selectEl, flag) {
        [...selectEl.options].forEach((opt) => {
          opt.selected = flag;
        });
      }

      function csvEscape(value) {
        const str = String(value ?? "");
        if (/[",\n]/.test(str)) {
          return `"${str.replace(/"/g, '""')}"`;
        }
        return str;
      }

      function normalizeNflisRows(rawRows) {
        const rows = [];
        const stateMap = new Map();
        const yearSet = new Set();
        const drugSet = new Set();

        for (const row of rawRows) {
          const state_abbr = String(row.state_abbr || "").trim();
          const state_name = String(row.state_name || "").trim();
          const drug_name = String(row.drug_name || "").trim();
          const year = Number(row.year);
          if (!state_abbr || !state_name || !drug_name || !Number.isFinite(year)) continue;

          const normalized = {
            state_abbr,
            state_name,
            drug_name,
            year,
            reports_count: toNumber(row.reports_count),
          };
          rows.push(normalized);
          yearSet.add(year);
          drugSet.add(drug_name);
          if (!stateMap.has(state_abbr)) {
            stateMap.set(state_abbr, { state_abbr, state_name });
          }
        }

        store.nflisRows = rows;
        store.nflisMeta.years = [...yearSet].sort((a, b) => a - b);
        store.nflisMeta.drugs = [...drugSet].sort((a, b) => a.localeCompare(b));
        store.nflisMeta.states = [...stateMap.values()].sort((a, b) => a.state_abbr.localeCompare(b.state_abbr));
      }

      function normalizeCbpRows(rawRows) {
        const rows = [];
        const fySet = new Set();
        const monthSet = new Set();
        const componentSet = new Set();
        const regionSet = new Set();
        const landSet = new Set();
        const aorSet = new Set();

        for (const row of rawRows) {
          const area = String(row.area_of_responsibility || "").trim();
          const fiscal_year_label = String(row.fiscal_year_label || "").trim();
          const month_abbr = String(row.month_abbr || "").trim().toUpperCase();
          const month_num = Number(row.month_num);
          const date = new Date(String(row.calendar_month_start || ""));
          if (!area || !fiscal_year_label || !month_abbr || !Number.isFinite(month_num) || Number.isNaN(date.getTime())) {
            continue;
          }

          const normalized = {
            fiscal_year_label,
            fiscal_year: Number(row.fiscal_year),
            fiscal_year_is_partial: String(row.fiscal_year_is_partial || "").toLowerCase() === "true",
            month_abbr,
            month_num,
            calendar_month_label: String(row.calendar_month_label || "").trim(),
            calendar_month_start: date,
            component: String(row.component || "").trim(),
            region: String(row.region || "").trim(),
            land_filter: String(row.land_filter || "").trim(),
            area_of_responsibility: area,
            aor_type: String(row.aor_type || "").trim(),
            count_of_event: toNumber(row.count_of_event),
            sum_qty_lbs: toNumber(row.sum_qty_lbs),
          };

          rows.push(normalized);
          fySet.add(normalized.fiscal_year_label);
          monthSet.add(normalized.month_abbr);
          componentSet.add(normalized.component);
          regionSet.add(normalized.region);
          landSet.add(normalized.land_filter);
          aorSet.add(normalized.area_of_responsibility);
        }

        store.cbpRows = rows;
        store.cbpMeta.fyLabels = [...fySet].sort((a, b) => {
          const ay = Number((a.match(/\d{4}/) || ["0"])[0]);
          const by = Number((b.match(/\d{4}/) || ["0"])[0]);
          if (ay !== by) return ay - by;
          return a.localeCompare(b);
        });
        store.cbpMeta.months = MONTH_ORDER.filter((m) => monthSet.has(m));
        store.cbpMeta.components = [...componentSet].sort((a, b) => a.localeCompare(b));
        store.cbpMeta.regions = [...regionSet].sort((a, b) => a.localeCompare(b));
        store.cbpMeta.landFilters = [...landSet].sort((a, b) => a.localeCompare(b));
        store.cbpMeta.aors = [...aorSet].sort((a, b) => a.localeCompare(b));
      }

      function initControls() {
        const nflisYears = store.nflisMeta.years;
        const defaultNflisYears = nflisYears.length ? [String(Math.max(...nflisYears))] : [];
        setMultiOptions(nflisYearSelect, nflisYears.map(String), defaultNflisYears);

        const nflisDrugs = store.nflisMeta.drugs;
        const defaultDrug = nflisDrugs.includes("Fentanyl") ? ["Fentanyl"] : nflisDrugs.slice(0, 1);
        setMultiOptions(nflisDrugSelect, nflisDrugs, defaultDrug);

        setMultiOptions(cbpMonthSelect, store.cbpMeta.months, store.cbpMeta.months);
        setMultiOptions(cbpComponentSelect, store.cbpMeta.components, store.cbpMeta.components);
        setMultiOptions(cbpRegionSelect, store.cbpMeta.regions, store.cbpMeta.regions);
        setMultiOptions(cbpLandSelect, store.cbpMeta.landFilters, store.cbpMeta.landFilters);
        setMultiOptions(cbpAorSelect, store.cbpMeta.aors, store.cbpMeta.aors);

        updateCbpFyOptions();
      }

      function updateCbpFyOptions() {
        const includeFytd = cbpIncludeFytd.checked;
        const allFy = store.cbpMeta.fyLabels;
        const allowedFy = includeFytd ? allFy : allFy.filter((fy) => !fy.toUpperCase().includes("FYTD"));
        const previouslySelected = selectedValues(cbpFySelect);
        const selected = allowedFy.filter((fy) => previouslySelected.includes(fy));
        const defaults = selected.length ? selected : allowedFy;
        setMultiOptions(cbpFySelect, allowedFy, defaults);
      }

      function bindControls() {
        sourceSelect.addEventListener("change", refresh);

        nflisYearSelect.addEventListener("change", refresh);
        nflisDrugSelect.addEventListener("change", refresh);
        nflisHideZero.addEventListener("change", refresh);
        document.querySelectorAll("input[name='nflisMetricMode']").forEach((el) => el.addEventListener("change", refresh));

        document.getElementById("nflisYearAll").addEventListener("click", () => {
          selectAll(nflisYearSelect, true);
          refresh();
        });
        document.getElementById("nflisYearNone").addEventListener("click", () => {
          selectAll(nflisYearSelect, false);
          refresh();
        });
        document.getElementById("nflisDrugAll").addEventListener("click", () => {
          selectAll(nflisDrugSelect, true);
          refresh();
        });
        document.getElementById("nflisDrugNone").addEventListener("click", () => {
          selectAll(nflisDrugSelect, false);
          refresh();
        });
        document.getElementById("nflisDrugFentanyl").addEventListener("click", () => {
          [...nflisDrugSelect.options].forEach((opt) => {
            opt.selected = opt.value === "Fentanyl";
          });
          refresh();
        });

        cbpIncludeFytd.addEventListener("change", () => {
          updateCbpFyOptions();
          refresh();
        });
        cbpFySelect.addEventListener("change", refresh);
        cbpMonthSelect.addEventListener("change", refresh);
        cbpComponentSelect.addEventListener("change", refresh);
        cbpRegionSelect.addEventListener("change", refresh);
        cbpLandSelect.addEventListener("change", refresh);
        cbpAorSelect.addEventListener("change", refresh);
        document.querySelectorAll("input[name='cbpMetricMode']").forEach((el) => el.addEventListener("change", refresh));

        document.getElementById("cbpFyAll").addEventListener("click", () => {
          selectAll(cbpFySelect, true);
          refresh();
        });
        document.getElementById("cbpFyNone").addEventListener("click", () => {
          selectAll(cbpFySelect, false);
          refresh();
        });
        document.getElementById("cbpAorAll").addEventListener("click", () => {
          selectAll(cbpAorSelect, true);
          refresh();
        });
        document.getElementById("cbpAorNone").addEventListener("click", () => {
          selectAll(cbpAorSelect, false);
          refresh();
        });

        document.getElementById("downloadCsv").addEventListener("click", downloadCurrentRows);
      }

      function setKpis(name1, value1, name2, value2, name3, value3) {
        kpi1Name.textContent = name1;
        kpi1Value.textContent = value1;
        kpi2Name.textContent = name2;
        kpi2Value.textContent = value2;
        kpi3Name.textContent = name3;
        kpi3Value.textContent = value3;
      }

      function setTable(rows, columns) {
        tableHeaderRow.innerHTML = "";
        tableBody.innerHTML = "";
        for (const col of columns) {
          const th = document.createElement("th");
          th.textContent = col.header;
          tableHeaderRow.appendChild(th);
        }

        for (const row of rows) {
          const tr = document.createElement("tr");
          for (const col of columns) {
            const td = document.createElement("td");
            td.textContent = col.render ? col.render(row[col.key], row) : String(row[col.key] ?? "");
            tr.appendChild(td);
          }
          tableBody.appendChild(tr);
        }
      }

      function renderNflis() {
        trendWrap.classList.add("hidden");
        Plotly.purge("trend");

        const years = selectedValues(nflisYearSelect).map(Number);
        const drugs = selectedValues(nflisDrugSelect);
        const mode = document.querySelector("input[name='nflisMetricMode']:checked").value;

        if (!years.length || !drugs.length) {
          setStatus("Select at least one year and one drug.");
          setKpis("Selected Drugs", String(drugs.length), "Selected Years", String(years.length), "Total Reports", "0");
          Plotly.newPlot("map", [], { geo: { scope: "usa" } }, { responsive: true, displayModeBar: false });
          setTable([], [
            { key: "state_name", header: "State" },
            { key: "state_abbr", header: "Abbr" },
            { key: "metric_value", header: "Metric" },
          ]);
          currentDownloadRows = [];
          return;
        }

        setStatus("");

        const yearSet = new Set(years);
        const drugSet = new Set(drugs);
        const totals = new Map();

        for (const state of store.nflisMeta.states) {
          totals.set(state.state_abbr, {
            state_abbr: state.state_abbr,
            state_name: state.state_name,
            metric_value: 0,
          });
        }

        for (const row of store.nflisRows) {
          if (!yearSet.has(row.year) || !drugSet.has(row.drug_name)) continue;
          const rec = totals.get(row.state_abbr);
          if (rec) rec.metric_value += row.reports_count;
        }

        let rows = [...totals.values()];
        if (mode === "avg") {
          const divisor = years.length || 1;
          rows = rows.map((r) => ({ ...r, metric_value: r.metric_value / divisor }));
        }

        if (nflisHideZero.checked) {
          rows = rows.filter((r) => r.metric_value > 0);
        }

        const metricLabel = mode === "avg" ? "Average annual reports" : "Total reports";
        const total = rows.reduce((sum, r) => sum + r.metric_value, 0);
        setKpis(
          "Selected Drugs",
          String(drugs.length),
          "Selected Years",
          String(years.length),
          metricLabel,
          mode === "avg" ? formatNum(total, 2) : formatNum(total, 0)
        );

        Plotly.newPlot(
          "map",
          [
            {
              type: "choropleth",
              locationmode: "USA-states",
              locations: rows.map((r) => r.state_abbr),
              z: rows.map((r) => r.metric_value),
              text: rows.map((r) => r.state_name),
              colorscale: LIGHT_TO_DARK_SCALE,
              reversescale: false,
              marker: { line: { color: "#ffffff", width: 0.7 } },
              colorbar: { title: metricLabel },
              hovertemplate: "%{text} (%{location})<br>" + metricLabel + ": %{z:,.2f}<extra></extra>",
            },
          ],
          {
            geo: { scope: "usa", bgcolor: "rgba(0,0,0,0)" },
            margin: { l: 0, r: 0, t: 12, b: 0 },
            paper_bgcolor: "rgba(0,0,0,0)",
            plot_bgcolor: "rgba(0,0,0,0)",
          },
          { responsive: true, displayModeBar: false }
        );

        rows.sort((a, b) => b.metric_value - a.metric_value);
        setTable(rows, [
          { key: "state_name", header: "State" },
          { key: "state_abbr", header: "Abbr" },
          { key: "metric_value", header: metricLabel, render: (v) => (mode === "avg" ? formatNum(v, 2) : formatNum(v, 0)) },
        ]);

        currentDownloadRows = rows.map((r) => ({ ...r, metric_mode: mode }));
        currentDownloadFilename = "nflis_filtered_state_totals.csv";
        footerNote.innerHTML = "Data files: <code>docs/nflis_state_year_drug_counts_2017_2022.csv</code>";
      }

      function renderCbp() {
        trendWrap.classList.remove("hidden");

        const fiscalYears = selectedValues(cbpFySelect);
        const months = selectedValues(cbpMonthSelect);
        const components = selectedValues(cbpComponentSelect);
        const regions = selectedValues(cbpRegionSelect);
        const landFilters = selectedValues(cbpLandSelect);
        const aors = selectedValues(cbpAorSelect);
        const metricMode = document.querySelector("input[name='cbpMetricMode']:checked").value;

        if (!fiscalYears.length || !months.length || !components.length || !regions.length || !landFilters.length || !aors.length) {
          setStatus("Select at least one value for each CBP filter.");
          setKpis("Selected AOR", "0", "Calendar Span", "N/A", "Seizure events", "0");
          Plotly.newPlot("map", [], { geo: { scope: "usa" } }, { responsive: true, displayModeBar: false });
          Plotly.newPlot("trend", [], { margin: { l: 0, r: 0, t: 10, b: 0 } }, { responsive: true, displayModeBar: false });
          setTable([], [
            { key: "area_of_responsibility", header: "Field Office / Sector" },
            { key: "aor_type", header: "Type" },
            { key: "events_total", header: "Events" },
            { key: "qty_lbs_total", header: "Qty (lbs)" },
          ]);
          currentDownloadRows = [];
          return;
        }

        setStatus("");

        const fySet = new Set(fiscalYears);
        const monthSet = new Set(months);
        const componentSet = new Set(components);
        const regionSet = new Set(regions);
        const landSet = new Set(landFilters);
        const aorSet = new Set(aors);

        const filtered = store.cbpRows.filter((row) =>
          fySet.has(row.fiscal_year_label) &&
          monthSet.has(row.month_abbr) &&
          componentSet.has(row.component) &&
          regionSet.has(row.region) &&
          landSet.has(row.land_filter) &&
          aorSet.has(row.area_of_responsibility)
        );

        if (!filtered.length) {
          setStatus("No CBP fentanyl records match the selected filters.");
          return;
        }

        const groupedMap = new Map();
        for (const row of filtered) {
          const key = row.area_of_responsibility;
          if (!groupedMap.has(key)) {
            groupedMap.set(key, {
              area_of_responsibility: row.area_of_responsibility,
              aor_type: row.aor_type,
              events_total: 0,
              qty_lbs_total: 0,
            });
          }
          const rec = groupedMap.get(key);
          rec.events_total += row.count_of_event;
          rec.qty_lbs_total += row.sum_qty_lbs;
        }

        let grouped = [...groupedMap.values()];
        for (const rec of grouped) {
          const coords = AOR_COORDS[rec.area_of_responsibility] || [null, null];
          rec.lat = coords[0];
          rec.lon = coords[1];
          rec.metric_value = metricMode === "events" ? rec.events_total : rec.qty_lbs_total;
        }

        const metricLabel = metricMode === "events" ? "Seizure events" : "Seized quantity (lbs)";
        const metricDigits = metricMode === "events" ? 0 : 2;

        const dates = filtered.map((r) => r.calendar_month_start).sort((a, b) => a - b);
        const start = dates[0];
        const end = dates[dates.length - 1];
        const span = `${start.toISOString().slice(0, 7)} to ${end.toISOString().slice(0, 7)}`;

        setKpis(
          "Selected AOR",
          String(grouped.length),
          "Calendar Span",
          span,
          metricLabel,
          formatNum(grouped.reduce((sum, r) => sum + r.metric_value, 0), metricDigits)
        );

        const mapRows = grouped.filter((r) => Number.isFinite(r.lat) && Number.isFinite(r.lon));
        const maxValue = Math.max(...mapRows.map((r) => r.metric_value), 0);
        const markerSizes = mapRows.map((r) => {
          if (maxValue <= 0) return 8;
          return 8 + (Math.sqrt(r.metric_value / maxValue) * 34);
        });

        Plotly.newPlot(
          "map",
          [
            {
              type: "scattergeo",
              mode: "markers",
              lat: mapRows.map((r) => r.lat),
              lon: mapRows.map((r) => r.lon),
              text: mapRows.map((r) => r.area_of_responsibility),
              customdata: mapRows.map((r) => [r.aor_type, r.events_total, r.qty_lbs_total, r.metric_value]),
              marker: {
                size: markerSizes,
                color: mapRows.map((r) => r.metric_value),
                colorscale: LIGHT_TO_DARK_SCALE,
                reversescale: false,
                line: { color: "#ffffff", width: 1 },
                colorbar: { title: metricLabel },
                showscale: true,
                opacity: 0.9,
              },
              hovertemplate:
                "%{text}<br>" +
                "Type: %{customdata[0]}<br>" +
                "Events: %{customdata[1]:,.0f}<br>" +
                "Qty (lbs): %{customdata[2]:,.2f}<br>" +
                metricLabel + ": %{customdata[3]:,.2f}<extra></extra>",
            },
          ],
          {
            geo: { scope: "usa", bgcolor: "rgba(0,0,0,0)" },
            margin: { l: 0, r: 0, t: 12, b: 0 },
            paper_bgcolor: "rgba(0,0,0,0)",
            plot_bgcolor: "rgba(0,0,0,0)",
          },
          { responsive: true, displayModeBar: false }
        );

        if (grouped.length > mapRows.length) {
          setStatus(`${grouped.length - mapRows.length} AOR entries were excluded from map due to missing coordinates.`);
        }

        const monthlyMap = new Map();
        for (const row of filtered) {
          const key = row.calendar_month_start.toISOString().slice(0, 10);
          if (!monthlyMap.has(key)) {
            monthlyMap.set(key, { date: key, events: 0, lbs: 0 });
          }
          const rec = monthlyMap.get(key);
          rec.events += row.count_of_event;
          rec.lbs += row.sum_qty_lbs;
        }
        const monthly = [...monthlyMap.values()].sort((a, b) => a.date.localeCompare(b.date));
        const trendY = metricMode === "events" ? monthly.map((r) => r.events) : monthly.map((r) => r.lbs);

        Plotly.newPlot(
          "trend",
          [
            {
              type: "scatter",
              mode: "lines+markers",
              x: monthly.map((r) => r.date),
              y: trendY,
              line: { color: "#d95f0e", width: 2 },
              marker: { size: 5, color: "#8c2d04" },
              hovertemplate: "%{x}<br>" + metricLabel + ": %{y:,.2f}<extra></extra>",
            },
          ],
          {
            title: `Monthly CBP fentanyl trend (${metricLabel})`,
            margin: { l: 0, r: 0, t: 36, b: 10 },
            xaxis: { title: "Calendar month-year" },
            yaxis: { title: metricLabel },
            paper_bgcolor: "rgba(0,0,0,0)",
            plot_bgcolor: "rgba(0,0,0,0)",
          },
          { responsive: true, displayModeBar: false }
        );

        grouped.sort((a, b) => b.metric_value - a.metric_value);
        setTable(grouped, [
          { key: "area_of_responsibility", header: "Field Office / Sector" },
          { key: "aor_type", header: "Type" },
          { key: "events_total", header: "Events", render: (v) => formatNum(v, 0) },
          { key: "qty_lbs_total", header: "Qty (lbs)", render: (v) => formatNum(v, 2) },
          { key: "metric_value", header: metricLabel, render: (v) => formatNum(v, metricDigits) },
        ]);

        currentDownloadRows = grouped.map((r) => ({
          area_of_responsibility: r.area_of_responsibility,
          aor_type: r.aor_type,
          events_total: r.events_total,
          qty_lbs_total: r.qty_lbs_total,
          metric_mode: metricMode,
          metric_value: r.metric_value,
        }));
        currentDownloadFilename = "cbp_fentanyl_filtered_aor_totals.csv";
        footerNote.innerHTML =
          "Data files: <code>docs/cbp_fentanyl_aor_monthly_2019_2026_dec.csv</code><br>" +
          "Fiscal-year months converted to calendar month-year for trend plotting.";
      }

      function refresh() {
        const source = sourceSelect.value;
        if (source === "nflis") {
          nflisControls.classList.remove("hidden");
          cbpControls.classList.add("hidden");
          renderNflis();
        } else {
          nflisControls.classList.add("hidden");
          cbpControls.classList.remove("hidden");
          renderCbp();
        }
      }

      function downloadCurrentRows() {
        if (!currentDownloadRows.length) {
          setStatus("No rows to download for current filters.");
          return;
        }

        const headers = Object.keys(currentDownloadRows[0]);
        const lines = [headers.join(",")];
        for (const row of currentDownloadRows) {
          lines.push(headers.map((h) => csvEscape(row[h])).join(","));
        }

        const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = currentDownloadFilename;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function boot() {
        try {
          setStatus("Loading datasets...");
          const [nflisRaw, cbpRaw] = await Promise.all([parseCsv(NFLIS_DATA_FILE), parseCsv(CBP_DATA_FILE)]);
          normalizeNflisRows(nflisRaw);
          normalizeCbpRows(cbpRaw);
          initControls();
          bindControls();
          setStatus("");
          refresh();
        } catch (err) {
          setStatus("Failed to load dashboard data: " + (err && err.message ? err.message : String(err)));
        }
      }

      boot();
    </script>
  </body>
</html>
